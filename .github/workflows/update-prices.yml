name: Update prices

on:
  schedule:
    # Every 30 min during BSE hours (09:00-16:00 IST = 03:30-10:30 UTC), Mon-Fri.
    # GitHub may delay scheduled runs by a few minutes under load.
    - cron: "0,30 3-10 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance
      - run: python fetch_prices.py
      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git commit -m "Update prices" || echo "No price changes"
          git push
